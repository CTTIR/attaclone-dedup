project:
  type: website
  output-dir: _site

website:
  title: "Attaclone-dedup"
  description: "A Zotero plugin for detecting and managing duplicate file attachments."
  repo-url: https://github.com/CTTIR/attaclone-dedup
  repo-actions: [edit, issue]
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Overview
      - href: vignette.qmd
        text: Walkthrough
    right:
      - icon: github
        href: https://github.com/CTTIR/attaclone-dedup
  page-footer:
    left: "© 2026 Raban Heller — MIT License"
    right: "Built with [Quarto](https://quarto.org/)"

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-copy: true
    anchor-sections: true
